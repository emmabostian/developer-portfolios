on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * 6"
name: Check markdown links
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --config .lycherc.toml --no-progress README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for ad/parking redirects
        id: parking
        run: |
          python src/check_parking_redirects.py \
            --lychee-out ./lychee/out.md \
            --output ./lychee/out.md \
            --concurrency 20 \
            --timeout 10
        continue-on-error: true

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0 || steps.parking.outcome == 'success'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "[Bot] Broken Links Report"
          content-filepath: ./lychee/out.md
          labels: report
